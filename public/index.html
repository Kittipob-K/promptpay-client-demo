<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptPay QR Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }

    h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }

    .settings-bar {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #166534;
      margin-bottom: 24px;
    }
    .settings-bar span { font-weight: 600; }

    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #444; }

    input[type="number"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="number"]:focus { border-color: #6366f1; }

    .row { display: flex; gap: 10px; align-items: flex-end; margin-top: 16px; }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.primary { background: #6366f1; color: #fff; flex: 1; }
    button.secondary { background: #f0f0f0; color: #444; }

    .divider { border: none; border-top: 1px solid #f0f0f0; margin: 24px 0; }

    /* QR section */
    #qr-section { display: none; }
    #qr-section.visible { display: block; }

    .qr-amount {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    .qr-amount-label { text-align: center; font-size: 13px; color: #888; margin-bottom: 16px; }

    .qr-img-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }
    .qr-img-wrap img {
      width: 220px;
      height: 220px;
      border-radius: 12px;
      border: 1px solid #eee;
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
    }
    .status-badge.pending  { background: #fef9c3; color: #854d0e; }
    .status-badge.fulfilled { background: #dcfce7; color: #166534; }
    .status-badge.expired  { background: #fee2e2; color: #991b1b; }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    /* Countdown */
    .countdown {
      font-size: 13px;
      color: #888;
    }
    .countdown.urgent { color: #dc2626; font-weight: 600; }

    /* Event log */
    .log-title { font-size: 12px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    #event-log { font-size: 12px; color: #555; line-height: 1.8; max-height: 140px; overflow-y: auto; }
    #event-log .log-line { padding: 2px 0; border-bottom: 1px solid #f5f5f5; }
    #event-log .log-fulfilled { color: #16a34a; font-weight: 600; }
    #event-log .log-expired   { color: #dc2626; }

    .error-msg { color: #dc2626; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
<div class="card">
  <h1>PromptPay QR Demo</h1>
  <p class="subtitle">ทดสอบระบบรับชำระเงินผ่าน PromptPay + Webhook</p>

  <div class="settings-bar" id="settings-bar">
    กำลังโหลด PromptPay ID…
  </div>

  <label for="amount">จำนวนเงิน (บาท)</label>
  <input type="number" id="amount" min="1" step="1" placeholder="100" />
  <p class="error-msg" id="amount-error"></p>

  <div class="row">
    <button class="primary" id="create-btn" onclick="createTransaction()">สร้าง QR</button>
    <button class="secondary" onclick="reset()">เริ่มใหม่</button>
  </div>

  <hr class="divider">

  <!-- QR + status section, hidden until a transaction is created -->
  <div id="qr-section">
    <div class="qr-amount" id="qr-amount"></div>
    <div class="qr-amount-label">จำนวนที่ต้องโอน (รวม suffix ความเป็นเอกลักษณ์)</div>

    <div class="qr-img-wrap">
      <img id="qr-img" src="" alt="QR Code" />
    </div>

    <div class="status-row">
      <span class="status-badge pending" id="status-badge">⏳ รอการชำระ</span>
      <span class="countdown" id="countdown"></span>
    </div>

    <hr class="divider" style="margin: 16px 0">

    <div class="log-title">Webhook Events</div>
    <div id="event-log"><div class="log-line" style="color:#aaa">รอ webhook...</div></div>
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let currentTxn = null;
  let countdownInterval = null;
  let eventSource = null;

  // ── On page load ──────────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    loadSettings();
    connectSSE();
  });

  async function loadSettings() {
    try {
      const res = await fetch('/settings');
      const data = await res.json();
      const bar = document.getElementById('settings-bar');
      if (data.promptpayId) {
        bar.innerHTML = `PromptPay ID: <span>${data.promptpayId}</span> (${data.promptpayType})`;
      } else {
        bar.textContent = 'ยังไม่ได้ตั้งค่า PromptPay ID — กรุณาตั้งค่าใน dashboard ก่อน';
        bar.style.background = '#fef9c3';
        bar.style.borderColor = '#fde047';
        bar.style.color = '#854d0e';
      }
    } catch {
      document.getElementById('settings-bar').textContent = 'โหลด settings ไม่ได้';
    }
  }

  // ── SSE: subscribe to webhook pushes from the Express server ──────────────
  function connectSSE() {
    eventSource = new EventSource('/events');

    eventSource.addEventListener('webhook', (e) => {
      const { event, transaction } = JSON.parse(e.data);
      handleWebhookEvent(event, transaction);
    });

    eventSource.onerror = () => {
      logEvent('SSE disconnected — reconnecting…', '');
    };
  }

  function handleWebhookEvent(event, transaction) {
    // Only update UI if this webhook is for the current transaction
    if (!currentTxn || transaction.id !== currentTxn.id) {
      logEvent(`${event} (txn ${transaction.id.slice(0, 12)}…)`, event);
      return;
    }

    if (event === 'transaction.fulfilled') {
      setStatus('fulfilled', '✅ ชำระเงินแล้ว');
      stopCountdown();
      logEvent('✅ transaction.fulfilled — ชำระเงินสำเร็จ', 'fulfilled');
    } else if (event === 'transaction.expired') {
      setStatus('expired', '❌ หมดอายุแล้ว');
      stopCountdown();
      logEvent('❌ transaction.expired — QR หมดอายุ', 'expired');
    }
  }

  // ── Create transaction ────────────────────────────────────────────────────
  async function createTransaction() {
    const amountInput = document.getElementById('amount');
    const amount = parseFloat(amountInput.value);
    const errEl = document.getElementById('amount-error');

    errEl.textContent = '';
    if (!amount || amount <= 0) {
      errEl.textContent = 'กรุณาใส่จำนวนเงินที่ถูกต้อง';
      return;
    }

    document.getElementById('create-btn').disabled = true;

    try {
      const res = await fetch('/create-transaction', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount }),
      });

      const data = await res.json();
      if (!res.ok) {
        errEl.textContent = data.message || data.error || 'เกิดข้อผิดพลาด';
        document.getElementById('create-btn').disabled = false;
        return;
      }

      showTransaction(data);
    } catch (err) {
      errEl.textContent = 'เชื่อมต่อ server ไม่ได้';
      document.getElementById('create-btn').disabled = false;
    }
  }

  function showTransaction(txn) {
    currentTxn = txn;

    document.getElementById('qr-amount').textContent = `฿${txn.amount.toFixed(2)}`;
    document.getElementById('qr-img').src = txn.qrDataUrl;
    document.getElementById('qr-section').classList.add('visible');

    setStatus('pending', '⏳ รอการชำระ');

    // Start countdown using expiresAt from the server response
    startCountdown(new Date(txn.expiresAt));

    logEvent(`สร้าง QR สำเร็จ — txn ${txn.id.slice(0, 12)}…`, '');
  }

  // ── Countdown timer ───────────────────────────────────────────────────────
  // We base the countdown on expiresAt sent by the server, not a local estimate.
  function startCountdown(expiresAt) {
    stopCountdown();
    const el = document.getElementById('countdown');

    function tick() {
      const remaining = Math.max(0, expiresAt - Date.now());
      const mins = Math.floor(remaining / 60000);
      const secs = Math.floor((remaining % 60000) / 1000);
      el.textContent = `หมดอายุใน ${mins}:${String(secs).padStart(2, '0')}`;
      el.className = `countdown${remaining < 30000 ? ' urgent' : ''}`;

      if (remaining === 0) {
        stopCountdown();
        el.textContent = 'หมดอายุแล้ว';
      }
    }

    tick();
    countdownInterval = setInterval(tick, 1000);
  }

  function stopCountdown() {
    if (countdownInterval) {
      clearInterval(countdownInterval);
      countdownInterval = null;
    }
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function setStatus(state, label) {
    const badge = document.getElementById('status-badge');
    badge.textContent = label;
    badge.className = `status-badge ${state}`;
  }

  function logEvent(message, type) {
    const log = document.getElementById('event-log');
    // Clear placeholder on first real event
    if (log.querySelector('[style*="color:#aaa"]')) log.innerHTML = '';

    const line = document.createElement('div');
    line.className = `log-line${type ? ` log-${type}` : ''}`;
    line.textContent = `${new Date().toLocaleTimeString('th')} — ${message}`;
    log.prepend(line);
  }

  function reset() {
    currentTxn = null;
    stopCountdown();
    document.getElementById('qr-section').classList.remove('visible');
    document.getElementById('amount').value = '';
    document.getElementById('amount-error').textContent = '';
    document.getElementById('create-btn').disabled = false;
    document.getElementById('event-log').innerHTML = '<div class="log-line" style="color:#aaa">รอ webhook...</div>';
    document.getElementById('countdown').textContent = '';
  }
</script>
</body>
</html>
